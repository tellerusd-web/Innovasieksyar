<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kolektor Luaran Inovasi</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 700: '#047857' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Google Material Symbols (React Safe Icons) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Custom Scrollbar & Utility Classes */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        body { transition: background-color 0.3s, color 0.3s; }

        /* Material Symbols Setup */
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
            line-height: 1;
        }

        /* Print Style Setup */
        @media print {
            body { background: white !important; color: black !important; }
            aside, header, .no-print { display: none !important; }
            main { overflow: visible !important; height: auto !important; margin: 0 !important; padding: 0 !important; }
            .glass-panel { box-shadow: none !important; border: 1px solid #ccc !important; background: transparent !important; }
            .print-only { display: block !important; }
            ::-webkit-scrollbar { display: none; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased selection:bg-emerald-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- KONFIGURASI API BACKEND ---
        // PENTING: Ganti nilai GAS_URL di bawah ini dengan URL Web App dari Apps Script Anda!
        const GAS_URL = 'MASUKKAN_URL_WEB_APP_APPSCRIPT_DISINI';
        
        // Mock Mode akan aktif jika URL belum diganti (sebagai fallback/preview)
        const isMockMode = GAS_URL === https://script.google.com/a/macros/gdrive1.biz.id/s/AKfycbx8TpGpfiLNSrYo2Ye6TQKuTre0oVq88Qmco-L67-_5eevkXfQN0uCQ9qSmoiLG4OHq/exec || GAS_URL === '';
        
        const mockData = [
            { id: 'INV-A1B2', timestamp: '2026-07-10T10:00:00Z', nim: '19001111', nama: 'Budi Santoso', prodi: 'Teknik Informatika', judul: 'Sistem Deteksi Penyakit Tanaman', kategori: 'Paten', deskripsi: 'Aplikasi AI', link: 'http://link', status: 'Disetujui' },
            { id: 'INV-C3D4', timestamp: '2026-07-11T14:30:00Z', nim: '19002222', nama: 'Siti Aminah', prodi: 'Sistem Informasi', judul: 'Blockchain in Supply Chain', kategori: 'Jurnal Internasional', deskripsi: 'Scopus Q2', link: 'http://link', status: 'Review' }
        ];

        // Helper function untuk mengirim request ke Apps Script
        const fetchGasApi = async (action, payload = {}) => {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    // Menggunakan text/plain untuk bypass CORS preflight request di browser
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, ...payload })
                });
                return await response.json();
            } catch (err) {
                console.error("Fetch Error:", err);
                return { success: false, msg: 'Gagal menghubungi server database.' };
            }
        };

        const API = {
            login: async (user, pass) => {
                if(isMockMode) {
                    return new Promise(resolve => setTimeout(() => {
                        if (user === 'admin' && pass === 'admin123') resolve({ success: true, name: 'Administrator' });
                        else resolve({ success: false, msg: 'Username/Password salah (Mock Mode)' });
                    }, 1000));
                }
                return await fetchGasApi('login', { user, pass });
            },
            getData: async () => {
                if(isMockMode) return new Promise(resolve => setTimeout(() => resolve(mockData), 800));
                
                const res = await fetchGasApi('getData');
                // Pastikan format kembalian selalu Array
                return Array.isArray(res) ? res : [];
            },
            saveData: async (data) => {
                if(isMockMode) return new Promise(resolve => setTimeout(() => resolve({ success: true }), 1000));
                return await fetchGasApi('saveData', { data });
            },
            changePassword: async (user, oldPass, newPass) => {
                if(isMockMode) return new Promise(resolve => setTimeout(() => resolve({ success: true, msg: 'Password berhasil diubah (Mock)' }), 1000));
                return await fetchGasApi('changePassword', { user, oldPass, newPass });
            }
        };

        // --- COMPONENTS ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, []);
            
            const bgColor = type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            const icon = type === 'success' ? 'check_circle' : 'error';
            
            return (
                <div className={`fixed bottom-4 right-4 ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50 animate-bounce`}>
                    <span className="material-symbols-rounded text-[24px]">{icon}</span>
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        const Login = ({ onLogin }) => {
            const [user, setUser] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                const res = await API.login(user, pass);
                setLoading(false);
                if (res.success) onLogin(res.name);
                else setError(res.msg);
            };

            return (
                <div className="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-900">
                    <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-emerald-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-50 animate-pulse"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-50 animate-pulse delay-1000"></div>
                    
                    <div className="w-full max-w-md p-8 relative z-10">
                        <div className="glass-panel p-10 rounded-3xl shadow-2xl border border-white/20">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-gradient-to-tr from-emerald-500 to-emerald-300 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg transform rotate-3">
                                    <span className="material-symbols-rounded text-[32px] text-white -rotate-3">lightbulb</span>
                                </div>
                                <h1 className="text-2xl font-bold text-white">Portal Inovasi</h1>
                                <p className="text-emerald-200 text-sm mt-1">Kolektor Luaran Mahasiswa</p>
                            </div>

                            {error && <div className="bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-3 rounded-xl mb-6 text-sm">{error}</div>}

                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-1">Username</label>
                                    <div className="relative">
                                        <span className="material-symbols-rounded absolute left-3 top-[10px] text-[20px] text-slate-400">person</span>
                                        <input type="text" value={user} onChange={(e) => setUser(e.target.value)} required 
                                            className="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" placeholder="Masukkan username" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-1">Password</label>
                                    <div className="relative">
                                        <span className="material-symbols-rounded absolute left-3 top-[10px] text-[20px] text-slate-400">lock</span>
                                        <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} required 
                                            className="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" placeholder="••••••••" />
                                    </div>
                                </div>
                                <button type="submit" disabled={loading} 
                                    className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-emerald-500/30 transition duration-300 flex justify-center items-center gap-2">
                                    {loading ? <span className="material-symbols-rounded animate-spin text-[20px]">progress_activity</span> : 'Masuk Dashboard'}
                                </button>
                            </form>
                            
                            {isMockMode && (
                                <div className="mt-6 text-center text-xs text-slate-400 bg-slate-800/50 py-2 rounded-lg">
                                    <span className="text-emerald-400 font-semibold">Mock Mode Aktif</span><br/>
                                    User: admin | Pass: admin123
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ data }) => {
            const chartRef = useRef(null);
            const doughnutRef = useRef(null);

            const stats = useMemo(() => {
                // BUG FIX: Proteksi jika data bernilai null/undefined
                const safeData = Array.isArray(data) ? data : [];
                const total = safeData.length;
                const disetujui = safeData.filter(d => d.status === 'Disetujui').length;
                const paten = safeData.filter(d => d.kategori === 'Paten').length;
                const startup = safeData.filter(d => d.kategori === 'Startup').length;
                return { total, disetujui, paten, startup };
            }, [data]);

            useEffect(() => {
                let myChart = null;
                let myDoughnut = null;

                if (chartRef.current && doughnutRef.current && data && data.length > 0) {
                    try {
                        const ctx = chartRef.current.getContext('2d');
                        const categories = ['Paten', 'Jurnal Internasional', 'Jurnal Nasional', 'Hak Cipta', 'Produk Tepat Guna', 'Startup'];
                        const counts = categories.map(cat => data.filter(d => d.kategori === cat).length);

                        myChart = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: categories,
                                datasets: [{ label: 'Jumlah Inovasi', data: counts, backgroundColor: 'rgba(16, 185, 129, 0.8)', borderRadius: 8 }]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: { y: { beginAtZero: true, grid: { color: 'rgba(156, 163, 175, 0.1)' } }, x: { grid: { display: false } } }
                            }
                        });

                        const ctx2 = doughnutRef.current.getContext('2d');
                        const statuses = ['Draft', 'Review', 'Disetujui', 'Ditolak'];
                        const statusCounts = statuses.map(s => data.filter(d => d.status === s).length);

                        myDoughnut = new Chart(ctx2, {
                            type: 'doughnut',
                            data: {
                                labels: statuses,
                                datasets: [{ data: statusCounts, backgroundColor: ['#94a3b8', '#fbbf24', '#10b981', '#ef4444'], borderWidth: 0 }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
                        });
                    } catch (e) {
                        console.error("Error rendering charts:", e);
                    }
                }
                
                return () => { 
                    if (myChart) myChart.destroy(); 
                    if (myDoughnut) myDoughnut.destroy(); 
                };
            }, [data]);

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-gradient-to-r from-emerald-600 to-emerald-400 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                        <div className="absolute right-0 top-0 opacity-20 transform translate-x-4 -translate-y-4">
                            <span className="material-symbols-rounded text-[150px]">workspace_premium</span>
                        </div>
                        <div className="relative z-10">
                            <h2 className="text-2xl font-bold mb-1">Ringkasan Luaran Mahasiswa</h2>
                            <p className="text-emerald-50">Pantau perkembangan dan kualitas inovasi mahasiswa terkini.</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {[
                            { title: 'Total Inovasi', value: stats.total, icon: 'layers', color: 'text-blue-500', bg: 'bg-blue-100 dark:bg-blue-900/30' },
                            { title: 'Disetujui', value: stats.disetujui, icon: 'check_circle', color: 'text-emerald-500', bg: 'bg-emerald-100 dark:bg-emerald-900/30' },
                            { title: 'Paten Tercatat', value: stats.paten, icon: 'shield', color: 'text-purple-500', bg: 'bg-purple-100 dark:bg-purple-900/30' },
                            { title: 'Startup Aktif', value: stats.startup, icon: 'rocket_launch', color: 'text-orange-500', bg: 'bg-orange-100 dark:bg-orange-900/30' },
                        ].map((stat, i) => (
                            <div key={i} className="glass-panel p-6 rounded-2xl shadow-sm hover:shadow-md transition">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-sm text-slate-500 dark:text-slate-400 font-medium">{stat.title}</p>
                                        <h3 className="text-3xl font-bold text-slate-800 dark:text-white mt-2">{stat.value}</h3>
                                    </div>
                                    <div className={`p-3 rounded-xl ${stat.bg}`}>
                                        <span className={`material-symbols-rounded text-[24px] ${stat.color}`}>{stat.icon}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-96">
                        <div className="lg:col-span-2 glass-panel p-6 rounded-2xl shadow-sm flex flex-col h-full">
                            <h3 className="text-lg font-semibold mb-4 text-slate-800 dark:text-white">Distribusi Kategori Inovasi</h3>
                            <div className="flex-grow relative w-full h-full">
                                <canvas ref={chartRef}></canvas>
                            </div>
                        </div>
                        <div className="glass-panel p-6 rounded-2xl shadow-sm flex flex-col h-full">
                            <h3 className="text-lg font-semibold mb-4 text-slate-800 dark:text-white">Status Penilaian</h3>
                            <div className="flex-grow relative w-full h-full">
                                <canvas ref={doughnutRef}></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const DataView = ({ data, onRefresh, showToast }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('Semua');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ id: '', nim: '', nama: '', prodi: '', judul: '', kategori: 'Paten', deskripsi: '', link: '', status: 'Draft' });
            const [loading, setLoading] = useState(false);

            // BUG FIX: Proteksi toLowerCase dari variabel kosong
            const safeData = Array.isArray(data) ? data : [];
            const filteredData = safeData.filter(item => {
                const judulLower = item.judul ? String(item.judul).toLowerCase() : '';
                const namaLower = item.nama ? String(item.nama).toLowerCase() : '';
                const searchLower = (searchTerm || '').toLowerCase();
                
                const matchSearch = judulLower.includes(searchLower) || namaLower.includes(searchLower);
                const matchStatus = filterStatus === 'Semua' || item.status === filterStatus;
                return matchSearch && matchStatus;
            });

            const handleEdit = (item) => {
                setFormData(item);
                setIsModalOpen(true);
            };

            const handleAdd = () => {
                setFormData({ id: '', nim: '', nama: '', prodi: '', judul: '', kategori: 'Paten', deskripsi: '', link: '', status: 'Draft' });
                setIsModalOpen(true);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                const submitData = { ...formData, id: formData.id || 'INV-' + Math.random().toString(36).substr(2, 6).toUpperCase() };
                const res = await API.saveData(submitData);
                setLoading(false);
                
                if (res.success) {
                    showToast('Data berhasil disimpan!', 'success');
                    setIsModalOpen(false);
                    onRefresh();
                }
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <h2 className="text-2xl font-bold text-slate-800 dark:text-white">Manajemen Data Inovasi</h2>
                        <button onClick={handleAdd} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-medium shadow-lg shadow-emerald-500/20 transition flex items-center gap-2">
                            <span className="material-symbols-rounded text-[20px]">add</span> Tambah Luaran
                        </button>
                    </div>

                    <div className="glass-panel p-4 rounded-2xl shadow-sm flex flex-col sm:flex-row gap-4">
                        <div className="relative flex-1">
                            <span className="material-symbols-rounded absolute left-3 top-[10px] text-[20px] text-slate-400">search</span>
                            <input type="text" placeholder="Cari judul atau nama mahasiswa..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                className="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-emerald-500 outline-none" />
                        </div>
                        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
                            className="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 outline-none min-w-[150px]">
                            <option value="Semua">Semua Status</option>
                            <option value="Draft">Draft</option>
                            <option value="Review">Review</option>
                            <option value="Disetujui">Disetujui</option>
                            <option value="Ditolak">Ditolak</option>
                        </select>
                    </div>

                    <div className="glass-panel rounded-2xl shadow-sm overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-100 dark:bg-slate-800/50 text-slate-600 dark:text-slate-300 text-sm">
                                        <th className="p-4 font-semibold">Judul Inovasi & Mahasiswa</th>
                                        <th className="p-4 font-semibold">Kategori</th>
                                        <th className="p-4 font-semibold">Status</th>
                                        <th className="p-4 font-semibold text-right">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.length > 0 ? filteredData.map((item, i) => (
                                        <tr key={i} className="border-t border-slate-200 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                                            <td className="p-4">
                                                <div className="font-semibold text-slate-800 dark:text-white line-clamp-1">{item.judul}</div>
                                                <div className="text-sm text-slate-500 dark:text-slate-400 mt-1">{item.nama} ({item.nim}) - {item.prodi}</div>
                                            </td>
                                            <td className="p-4">
                                                <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800 dark:bg-indigo-900/30 dark:text-indigo-300">
                                                    {item.kategori}
                                                </span>
                                            </td>
                                            <td className="p-4">
                                                <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium 
                                                    ${item.status === 'Disetujui' ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-300' : 
                                                      item.status === 'Review' ? 'bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-300' :
                                                      item.status === 'Ditolak' ? 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300' :
                                                      'bg-slate-100 text-slate-800 dark:bg-slate-700 dark:text-slate-300'}`}>
                                                    {item.status}
                                                </span>
                                            </td>
                                            <td className="p-4 text-right">
                                                <button onClick={() => handleEdit(item)} className="p-2 text-slate-400 hover:text-emerald-500 transition rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
                                                    <span className="material-symbols-rounded text-[20px]">edit</span>
                                                </button>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr>
                                            <td colSpan="4" className="p-8 text-center text-slate-500">
                                                <span className="material-symbols-rounded text-[48px] mx-auto mb-3 opacity-50 block">inbox</span>
                                                Tidak ada data yang ditemukan.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
                                    <h3 className="text-xl font-bold">{formData.id ? 'Edit Luaran' : 'Tambah Luaran Baru'}</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-white">
                                        <span className="material-symbols-rounded text-[24px]">close</span>
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto custom-scrollbar">
                                    <form id="inovasiForm" onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-medium mb-1">Judul Inovasi / Luaran</label>
                                            <input type="text" required value={formData.judul} onChange={e => setFormData({...formData, judul: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">NIM Mahasiswa</label>
                                            <input type="text" required value={formData.nim} onChange={e => setFormData({...formData, nim: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Nama Mahasiswa</label>
                                            <input type="text" required value={formData.nama} onChange={e => setFormData({...formData, nama: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Program Studi</label>
                                            <input type="text" required value={formData.prodi} onChange={e => setFormData({...formData, prodi: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Kategori Luaran</label>
                                            <select value={formData.kategori} onChange={e => setFormData({...formData, kategori: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent focus:border-emerald-500 outline-none">
                                                <option className="dark:bg-slate-800" value="Paten">Paten</option>
                                                <option className="dark:bg-slate-800" value="Hak Cipta">Hak Cipta (HAKI)</option>
                                                <option className="dark:bg-slate-800" value="Jurnal Internasional">Jurnal Internasional</option>
                                                <option className="dark:bg-slate-800" value="Jurnal Nasional">Jurnal Nasional</option>
                                                <option className="dark:bg-slate-800" value="Produk Tepat Guna">Produk Tepat Guna</option>
                                                <option className="dark:bg-slate-800" value="Startup">Startup / Bisnis</option>
                                                <option className="dark:bg-slate-800" value="Lainnya">Lainnya</option>
                                            </select>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-medium mb-1">Deskripsi Singkat</label>
                                            <textarea rows="3" value={formData.deskripsi} onChange={e => setFormData({...formData, deskripsi: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent focus:border-emerald-500 outline-none"></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Tautan Bukti (URL)</label>
                                            <input type="url" value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent focus:border-emerald-500 outline-none" placeholder="https://..." />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Status Penilaian</label>
                                            <select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent focus:border-emerald-500 outline-none">
                                                <option className="dark:bg-slate-800" value="Draft">Draft</option>
                                                <option className="dark:bg-slate-800" value="Review">Sedang Direview</option>
                                                <option className="dark:bg-slate-800" value="Disetujui">Disetujui</option>
                                                <option className="dark:bg-slate-800" value="Ditolak">Ditolak</option>
                                            </select>
                                        </div>
                                    </form>
                                </div>
                                <div className="p-6 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3">
                                    <button onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 rounded-xl text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition">Batal</button>
                                    <button form="inovasiForm" type="submit" disabled={loading} className="px-5 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-medium shadow-lg flex items-center gap-2 transition">
                                        {loading ? <span className="material-symbols-rounded animate-spin text-[20px]">progress_activity</span> : 'Simpan Data'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- NEW COMPONENT: REPORT VIEW ---
        const ReportView = ({ data }) => {
            const handlePrint = () => {
                window.print();
            };

            const safeData = Array.isArray(data) ? data : [];

            return (
                <div className="space-y-6 animate-fade-in w-full">
                    <div className="flex justify-between items-center no-print">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800 dark:text-white">Laporan Inovasi</h2>
                            <p className="text-sm text-slate-500">Rekapitulasi seluruh data luaran inovasi.</p>
                        </div>
                        <button onClick={handlePrint} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-medium shadow-lg shadow-blue-500/20 transition flex items-center gap-2">
                            <span className="material-symbols-rounded text-[20px]">print</span> Cetak / PDF
                        </button>
                    </div>

                    <div className="glass-panel p-6 rounded-2xl shadow-sm bg-white dark:bg-slate-900 w-full overflow-hidden">
                        {/* Header khusus saat di print */}
                        <div className="text-center mb-6 hidden print:block text-black">
                            <h1 className="text-2xl font-bold">Laporan Luaran Inovasi Mahasiswa</h1>
                            <p className="text-slate-600">Dicetak pada: {new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                            <hr className="my-4 border-slate-300" />
                        </div>
                        
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse border border-slate-200 dark:border-slate-700">
                                <thead>
                                    <tr className="bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 print:bg-slate-100 print:text-black">
                                        <th className="p-3 border border-slate-200 dark:border-slate-700 font-semibold text-sm">No</th>
                                        <th className="p-3 border border-slate-200 dark:border-slate-700 font-semibold text-sm">NIM</th>
                                        <th className="p-3 border border-slate-200 dark:border-slate-700 font-semibold text-sm">Nama Mahasiswa</th>
                                        <th className="p-3 border border-slate-200 dark:border-slate-700 font-semibold text-sm">Program Studi</th>
                                        <th className="p-3 border border-slate-200 dark:border-slate-700 font-semibold text-sm">Judul Inovasi</th>
                                        <th className="p-3 border border-slate-200 dark:border-slate-700 font-semibold text-sm">Kategori</th>
                                        <th className="p-3 border border-slate-200 dark:border-slate-700 font-semibold text-sm">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {safeData.length > 0 ? safeData.map((item, i) => (
                                        <tr key={i} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 print:text-black">
                                            <td className="p-3 border border-slate-200 dark:border-slate-700 text-sm">{i + 1}</td>
                                            <td className="p-3 border border-slate-200 dark:border-slate-700 text-sm">{item.nim}</td>
                                            <td className="p-3 border border-slate-200 dark:border-slate-700 text-sm">{item.nama}</td>
                                            <td className="p-3 border border-slate-200 dark:border-slate-700 text-sm">{item.prodi}</td>
                                            <td className="p-3 border border-slate-200 dark:border-slate-700 text-sm">{item.judul}</td>
                                            <td className="p-3 border border-slate-200 dark:border-slate-700 text-sm">{item.kategori}</td>
                                            <td className="p-3 border border-slate-200 dark:border-slate-700 text-sm">{item.status}</td>
                                        </tr>
                                    )) : (
                                        <tr>
                                            <td colSpan="7" className="p-6 text-center text-slate-500">
                                                Belum ada data inovasi.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- NEW COMPONENT: SETTINGS VIEW ---
        const SettingsView = ({ user, toggleTheme, isDark, showToast }) => {
            const [oldPass, setOldPass] = useState('');
            const [newPass, setNewPass] = useState('');
            const [loading, setLoading] = useState(false);

            const handlePasswordChange = async (e) => {
                e.preventDefault();
                if(!oldPass || !newPass) return;
                setLoading(true);
                const res = await API.changePassword(user, oldPass, newPass);
                setLoading(false);
                if(res.success) {
                    showToast(res.msg, 'success');
                    setOldPass('');
                    setNewPass('');
                } else {
                    showToast(res.msg, 'error');
                }
            };

            return (
                <div className="space-y-6 animate-fade-in w-full max-w-4xl mx-auto">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800 dark:text-white">Pengaturan Sistem</h2>
                        <p className="text-sm text-slate-500">Kelola preferensi akun dan tampilan aplikasi.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Profil & Keamanan */}
                        <div className="glass-panel p-6 rounded-2xl shadow-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
                            <div className="flex items-center gap-3 mb-6">
                                <span className="material-symbols-rounded text-emerald-500 text-[28px]">manage_accounts</span>
                                <h3 className="text-lg font-semibold text-slate-800 dark:text-white">Profil & Keamanan</h3>
                            </div>
                            
                            <div className="mb-6 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-700">
                                <p className="text-sm text-slate-500 dark:text-slate-400">Akun Aktif</p>
                                <p className="font-bold text-slate-800 dark:text-white text-lg">{user}</p>
                                <span className="inline-block mt-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-300">Administrator</span>
                            </div>

                            <form onSubmit={handlePasswordChange} className="space-y-4">
                                <h4 className="text-sm font-medium text-slate-700 dark:text-slate-300">Ubah Password</h4>
                                <div>
                                    <input type="password" placeholder="Password Lama" value={oldPass} onChange={e => setOldPass(e.target.value)} required className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-white focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" />
                                </div>
                                <div>
                                    <input type="password" placeholder="Password Baru" value={newPass} onChange={e => setNewPass(e.target.value)} required className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-white focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" />
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-medium shadow-lg shadow-emerald-500/20 transition flex items-center justify-center gap-2">
                                    {loading ? <span className="material-symbols-rounded animate-spin text-[20px]">progress_activity</span> : 'Simpan Password Baru'}
                                </button>
                            </form>
                        </div>

                        {/* Preferensi Aplikasi */}
                        <div className="space-y-6">
                            <div className="glass-panel p-6 rounded-2xl shadow-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
                                <div className="flex items-center gap-3 mb-6">
                                    <span className="material-symbols-rounded text-blue-500 text-[28px]">palette</span>
                                    <h3 className="text-lg font-semibold text-slate-800 dark:text-white">Tampilan</h3>
                                </div>
                                <div className="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-700">
                                    <div>
                                        <p className="font-medium text-slate-800 dark:text-white">Mode Gelap (Dark Mode)</p>
                                        <p className="text-sm text-slate-500">Sesuaikan tema untuk kenyamanan mata.</p>
                                    </div>
                                    <button onClick={toggleTheme} className={`relative inline-flex h-7 w-12 items-center rounded-full transition-colors ${isDark ? 'bg-emerald-500' : 'bg-slate-300'}`}>
                                        <span className={`inline-block h-5 w-5 transform rounded-full bg-white transition-transform ${isDark ? 'translate-x-6' : 'translate-x-1'}`} />
                                    </button>
                                </div>
                            </div>

                            <div className="glass-panel p-6 rounded-2xl shadow-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
                                <div className="flex items-center gap-3 mb-4">
                                    <span className="material-symbols-rounded text-purple-500 text-[28px]">info</span>
                                    <h3 className="text-lg font-semibold text-slate-800 dark:text-white">Tentang Aplikasi</h3>
                                </div>
                                <div className="space-y-3 text-sm text-slate-600 dark:text-slate-400">
                                    <div className="flex justify-between border-b border-slate-100 dark:border-slate-700 pb-2">
                                        <span>Versi Aplikasi</span>
                                        <span className="font-medium text-slate-800 dark:text-white">V5.0 Ultimate</span>
                                    </div>
                                    <div className="flex justify-between border-b border-slate-100 dark:border-slate-700 pb-2">
                                        <span>Framework Backend</span>
                                        <span className="font-medium text-slate-800 dark:text-white">Google Apps Script</span>
                                    </div>
                                    <div className="flex justify-between pb-2">
                                        <span>Framework Frontend</span>
                                        <span className="font-medium text-slate-800 dark:text-white">React + Tailwind CSS</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeMenu, setActiveMenu] = useState('dashboard');
            const [isDark, setIsDark] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [toast, setToast] = useState(null);
            const [data, setData] = useState([]);
            const [loadingData, setLoadingData] = useState(false);

            useEffect(() => {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setIsDark(true);
                    document.documentElement.classList.add('dark');
                }
            }, []);

            const toggleTheme = () => {
                setIsDark(!isDark);
                document.documentElement.classList.toggle('dark');
            };

            const loadData = async () => {
                setLoadingData(true);
                try {
                    const result = await API.getData();
                    // BUG FIX: Pastikan format state selalu berupa Array
                    setData(Array.isArray(result) ? result : []);
                } catch(e) {
                    setData([]);
                }
                setLoadingData(false);
            };

            useEffect(() => {
                if (user) loadData();
            }, [user]);

            const hour = new Date().getHours();
            const greeting = hour < 11 ? 'Selamat Pagi ☀️' : hour < 15 ? 'Selamat Siang 🌤️' : hour < 18 ? 'Selamat Sore 🌅' : 'Selamat Malam 🌙';

            if (!user) return <Login onLogin={setUser} />;

            return (
                <div className="flex h-screen overflow-hidden">
                    {sidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-20 lg:hidden" onClick={() => setSidebarOpen(false)}></div>}
                    
                    <aside className={`fixed lg:static inset-y-0 left-0 z-30 w-64 glass-panel border-r border-slate-200 dark:border-slate-800 flex flex-col transition-transform duration-300 transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0`}>
                        <div className="p-6 flex items-center gap-3 border-b border-slate-200 dark:border-slate-800">
                            <div className="w-10 h-10 bg-gradient-to-tr from-emerald-500 to-emerald-300 rounded-xl flex items-center justify-center shadow-lg">
                                <span className="material-symbols-rounded text-[24px] text-white">lightbulb</span>
                            </div>
                            <span className="font-bold text-lg text-slate-800 dark:text-white">InovaHub</span>
                        </div>
                        
                        <nav className="flex-1 px-4 py-6 space-y-2">
                            {[
                                { id: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
                                { id: 'data', icon: 'database', label: 'Data Inovasi' },
                                { id: 'report', icon: 'bar_chart', label: 'Laporan Inovasi' },
                                { id: 'settings', icon: 'settings', label: 'Pengaturan' }
                            ].map(item => (
                                <button key={item.id} onClick={() => { setActiveMenu(item.id); setSidebarOpen(false); }}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeMenu === item.id ? 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-medium' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                                    <span className="material-symbols-rounded text-[24px]">{item.icon}</span> {item.label}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="p-4 border-t border-slate-200 dark:border-slate-800">
                            <div className="flex items-center gap-3 px-4 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl">
                                <div className="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white font-bold text-sm">
                                    {user.charAt(0)}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-sm font-semibold truncate text-slate-800 dark:text-white">{user}</p>
                                    <p className="text-xs text-slate-500 truncate">Administrator</p>
                                </div>
                                <button onClick={() => setUser(null)} className="text-slate-400 hover:text-red-500">
                                    <span className="material-symbols-rounded text-[20px]">logout</span>
                                </button>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <header className="glass-panel border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex justify-between items-center z-10">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setSidebarOpen(true)} className="lg:hidden text-slate-500 hover:text-emerald-500 flex items-center justify-center">
                                    <span className="material-symbols-rounded text-[24px]">menu</span>
                                </button>
                                <div>
                                    <h1 className="text-xl font-bold text-slate-800 dark:text-white hidden sm:block">{greeting}</h1>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                {isMockMode && <span className="bg-amber-100 text-amber-800 text-xs px-2 py-1 rounded-md font-medium border border-amber-200">Mock Mode</span>}
                                <button onClick={toggleTheme} className="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-emerald-500 transition flex items-center justify-center">
                                    <span className="material-symbols-rounded text-[20px]">{isDark ? 'light_mode' : 'dark_mode'}</span>
                                </button>
                                <div className="hidden sm:block text-right">
                                    <p className="text-sm font-medium text-slate-800 dark:text-white">{new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 custom-scrollbar">
                            {loadingData ? (
                                <div className="h-full flex items-center justify-center">
                                    <div className="flex flex-col items-center text-slate-400">
                                        <span className="material-symbols-rounded text-[40px] animate-spin mb-4 text-emerald-500">progress_activity</span>
                                        <p>Memuat data...</p>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    {activeMenu === 'dashboard' && <DashboardView data={data} />}
                                    {activeMenu === 'data' && <DataView data={data} onRefresh={loadData} showToast={(msg, type) => setToast({msg, type})} />}
                                    {activeMenu === 'report' && <ReportView data={data} />}
                                    {activeMenu === 'settings' && <SettingsView user={user} toggleTheme={toggleTheme} isDark={isDark} showToast={(msg, type) => setToast({msg, type})} />}
                                </>
                            )}
                        </div>

                        <footer className="text-center py-3 text-xs text-slate-400 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 z-10">
                            Generated by Bot AppScript | By @opickdigital
                        </footer>
                        
                        {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
