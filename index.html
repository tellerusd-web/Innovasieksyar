<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InovaHub - Kolektor Luaran Inovasi</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Library Export Excel & PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7',
                            400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857',
                            800: '#065f46', 900: '#064e3b',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        // PENTING: Ganti URL di bawah ini dengan URL Web App Google Apps Script Bos!
        const GAS_URL = 'https://script.google.com/a/macros/gdrive1.biz.id/s/AKfycbx8TpGpfiLNSrYo2Ye6TQKuTre0oVq88Qmco-L67-_5eevkXfQN0uCQ9qSmoiLG4OHq/exec'; 

        const Icon = ({ name, className = "" }) => (
            <span className={`material-symbols-outlined ${className}`}>{name}</span>
        );

        const mockData = [
            { id: 'INV-001', timestamp: new Date().toISOString(), nim: '19001111', nama: 'Budi Santoso', prodi: 'Teknik Informatika', judul: 'Sistem Deteksi Penyakit Tanaman', kategori: 'Paten', deskripsi: 'Aplikasi AI pendeteksi penyakit', link: '#', status: 'Disetujui' },
            { id: 'INV-002', timestamp: new Date().toISOString(), nim: '19002222', nama: 'Siti Aminah', prodi: 'Sistem Informasi', judul: 'Blockchain untuk Supply Chain', kategori: 'Jurnal Internasional', deskripsi: 'Jurnal Scopus Q2', link: '#', status: 'Review' },
            { id: 'INV-003', timestamp: new Date().toISOString(), nim: '19003333', nama: 'Agus Pratama', prodi: 'Teknik Elektro', judul: 'Robot Pembersih Sungai Otomatis', kategori: 'Produk Tepat Guna', deskripsi: 'Robot bertenaga surya pembersih sampah sungai', link: '#', status: 'Disetujui' },
            { id: 'INV-004', timestamp: new Date().toISOString(), nim: '19004444', nama: 'Dian Sastro', prodi: 'Desain Komunikasi Visual', judul: 'Kampanye Digital Pelestarian Komodo', kategori: 'Hak Cipta', deskripsi: 'Desain kampanye visual terdaftar HAKI', link: '#', status: 'Draft' }
        ];

        const callApi = async (action, payload = {}) => {
            if (GAS_URL === 'MASUKKAN_URL_WEB_APP_APPSCRIPT_DISINI') {
                console.warn("MOCK MODE: Menggunakan data tiruan karena GAS URL belum disetel.");
                return simulateMock(action, payload);
            }

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, ...payload })
                });
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error("API Error:", error);
                throw new Error("Gagal terhubung ke server. Periksa koneksi internet Anda.");
            }
        };

        const simulateMock = (action, payload) => {
            return new Promise((resolve) => {
                setTimeout(() => {
                    if (action === 'login') {
                        if (payload.user === 'admin' && payload.pass === 'admin123') resolve({ success: true, name: 'Admin Mock', role: 'Administrator' });
                        else resolve({ success: false, msg: 'Username/Password salah (Mock)' });
                    } else if (action === 'getData') resolve(mockData);
                    else if (action === 'saveData' || action === 'changePassword') resolve({ success: true, msg: 'Berhasil (Mock Mode)' });
                    else resolve({ success: false, msg: 'Unknown action' });
                }, 800);
            });
        };

        const DashboardView = ({ data }) => {
            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);

            React.useEffect(() => {
                if (!chartRef.current || data.length === 0) return;

                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();

                const categoryCounts = data.reduce((acc, curr) => {
                    acc[curr.kategori] = (acc[curr.kategori] || 0) + 1;
                    return acc;
                }, {});

                try {
                    chartInstance.current = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(categoryCounts),
                            datasets: [{
                                data: Object.values(categoryCounts),
                                backgroundColor: ['#059669', '#10b981', '#34d399', '#6ee7b7', '#f59e0b', '#3b82f6', '#8b5cf6'],
                                borderWidth: 0
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                    });
                } catch(e) { console.error("Chart Error:", e); }

                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [data]);

            const stats = [
                { title: 'Total Luaran', value: data.length, icon: 'folder_open', color: 'bg-blue-100 text-blue-600' },
                { title: 'Disetujui', value: data.filter(d => d.status === 'Disetujui').length, icon: 'verified', color: 'bg-emerald-100 text-emerald-600' },
                { title: 'Dalam Review', value: data.filter(d => d.status === 'Review').length, icon: 'pending_actions', color: 'bg-orange-100 text-orange-600' },
                { title: 'Draft', value: data.filter(d => d.status === 'Draft').length, icon: 'edit_document', color: 'bg-slate-100 text-slate-600' }
            ];

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {stats.map((stat, idx) => (
                            <div key={idx} className="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 flex items-center gap-4 hover:-translate-y-1 transition-transform">
                                <div className={`w-14 h-14 rounded-2xl flex items-center justify-center ${stat.color}`}>
                                    <Icon name={stat.icon} className="text-3xl" />
                                </div>
                                <div>
                                    <p className="text-sm text-slate-500 dark:text-slate-400 font-medium">{stat.title}</p>
                                    <h3 className="text-3xl font-bold">{stat.value}</h3>
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                            <h3 className="text-lg font-bold mb-4">Aktivitas Terbaru</h3>
                            <div className="space-y-4">
                                {data.slice(0, 5).map((item, idx) => (
                                    <div key={idx} className="flex justify-between items-center p-4 bg-slate-50 dark:bg-slate-700/50 rounded-2xl">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 flex items-center justify-center font-bold">
                                                {item.nama && item.nama.charAt(0)}
                                            </div>
                                            <div>
                                                <p className="font-semibold text-sm">{item.judul}</p>
                                                <p className="text-xs text-slate-500">{item.nama} • {item.kategori}</p>
                                            </div>
                                        </div>
                                        <span className={`px-3 py-1 rounded-full text-xs font-medium ${item.status === 'Disetujui' ? 'bg-emerald-100 text-emerald-600' : item.status === 'Review' ? 'bg-orange-100 text-orange-600' : 'bg-slate-200 text-slate-700'}`}>
                                            {item.status}
                                        </span>
                                    </div>
                                ))}
                                {data.length === 0 && <p className="text-center text-slate-500 py-4">Belum ada data inovasi.</p>}
                            </div>
                        </div>
                        <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                            <h3 className="text-lg font-bold mb-4">Sebaran Kategori</h3>
                            <div className="h-64 relative">
                                {data.length > 0 ? <canvas ref={chartRef}></canvas> : <div className="h-full flex items-center justify-center text-slate-400">Tidak ada data grafik</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const DataView = ({ data, onSave, onToast }) => {
            const [search, setSearch] = React.useState('');
            const [filterStatus, setFilterStatus] = React.useState('');
            const [isModalOpen, setIsModalOpen] = React.useState(false);
            const [formData, setFormData] = React.useState({ id: '', nim: '', nama: '', prodi: '', judul: '', kategori: 'Paten', deskripsi: '', link: '', status: 'Draft' });

            // Lengkap: Semua Kategori Luaran
            const categories = ['Paten', 'Jurnal Internasional', 'Jurnal Nasional', 'Hak Cipta', 'Produk Tepat Guna', 'Startup'];

            const filteredData = data.filter(item => {
                if (!item) return false;
                const judul = item.judul ? item.judul.toLowerCase() : '';
                const nama = item.nama ? item.nama.toLowerCase() : '';
                const searchTerm = search.toLowerCase();
                const matchSearch = judul.includes(searchTerm) || nama.includes(searchTerm);
                const matchStatus = filterStatus ? item.status === filterStatus : true;
                return matchSearch && matchStatus;
            });

            const handleEdit = (item) => {
                setFormData(item);
                setIsModalOpen(true);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave({ ...formData, id: formData.id || 'INV-' + new Date().getTime() });
                setIsModalOpen(false);
                onToast("Menyimpan data...");
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                        <h2 className="text-xl font-bold">Manajemen Data Inovasi</h2>
                        <button onClick={() => { setFormData({ id: '', nim: '', nama: '', prodi: '', judul: '', kategori: 'Paten', deskripsi: '', link: '', status: 'Draft' }); setIsModalOpen(true); }} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 shadow-lg shadow-emerald-500/30 transition-all font-medium">
                            <Icon name="add" /> Tambah Luaran
                        </button>
                    </div>

                    <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
                        <div className="p-4 border-b border-slate-100 dark:border-slate-700 flex flex-col md:flex-row gap-4 bg-slate-50/50 dark:bg-slate-800/50">
                            <div className="relative flex-1">
                                <Icon name="search" className="absolute left-3 top-2.5 text-slate-400" />
                                <input type="text" placeholder="Cari judul atau nama mahasiswa..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 focus:ring-2 focus:ring-emerald-500 outline-none" />
                            </div>
                            <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 focus:ring-2 focus:ring-emerald-500 outline-none">
                                <option value="">Semua Status</option>
                                <option value="Draft">Draft</option>
                                <option value="Review">Review</option>
                                <option value="Disetujui">Disetujui</option>
                            </select>
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 dark:bg-slate-700/50 text-slate-500 dark:text-slate-400">
                                    <tr>
                                        <th className="p-4 font-medium">Judul Inovasi & Mahasiswa</th>
                                        <th className="p-4 font-medium">Kategori</th>
                                        <th className="p-4 font-medium">Status</th>
                                        <th className="p-4 font-medium">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                                    {filteredData.map((item, idx) => (
                                        <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-700/20 transition-colors">
                                            <td className="p-4">
                                                <p className="font-semibold text-base">{item.judul}</p>
                                                <p className="text-slate-500 mt-1">{item.nama} ({item.nim}) - {item.prodi}</p>
                                            </td>
                                            <td className="p-4">
                                                <span className="px-3 py-1 bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400 rounded-full text-xs font-medium">{item.kategori}</span>
                                            </td>
                                            <td className="p-4">
                                                <span className={`px-3 py-1 rounded-full text-xs font-medium ${item.status === 'Disetujui' ? 'bg-emerald-100 text-emerald-600' : item.status === 'Review' ? 'bg-orange-100 text-orange-600' : 'bg-slate-100 text-slate-600'}`}>
                                                    {item.status}
                                                </span>
                                            </td>
                                            <td className="p-4">
                                                <button onClick={() => handleEdit(item)} className="p-2 text-slate-400 hover:text-emerald-600 bg-slate-100 hover:bg-emerald-50 dark:bg-slate-700 dark:hover:bg-emerald-900/30 rounded-xl transition-colors">
                                                    <Icon name="edit" />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredData.length === 0 && (
                                        <tr><td colSpan="4" className="text-center p-8 text-slate-500">Tidak ada data ditemukan.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex justify-center items-center p-4 z-50">
                            <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 w-full max-w-2xl shadow-2xl animate-fade-in max-h-[90vh] overflow-y-auto">
                                <h2 className="text-2xl font-bold mb-6">{formData.id ? 'Edit Luaran' : 'Tambah Luaran'}</h2>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input required placeholder="NIM" className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500" value={formData.nim} onChange={e => setFormData({...formData, nim: e.target.value})} />
                                        <input required placeholder="Nama Mahasiswa" className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500" value={formData.nama} onChange={e => setFormData({...formData, nama: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input required placeholder="Program Studi" className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500" value={formData.prodi} onChange={e => setFormData({...formData, prodi: e.target.value})} />
                                        <select className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500" value={formData.kategori} onChange={e => setFormData({...formData, kategori: e.target.value})}>
                                            {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <input required placeholder="Judul Luaran / Inovasi" className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500" value={formData.judul} onChange={e => setFormData({...formData, judul: e.target.value})} />
                                    <textarea rows="3" placeholder="Deskripsi Singkat" className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500 resize-none" value={formData.deskripsi} onChange={e => setFormData({...formData, deskripsi: e.target.value})}></textarea>
                                    <input type="url" placeholder="Tautan Bukti (G-Drive / Jurnal)" className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500" value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})} />
                                    <select className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500 font-medium" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}>
                                        <option value="Draft">Status: Draft</option>
                                        <option value="Review">Status: Review</option>
                                        <option value="Disetujui">Status: Disetujui</option>
                                    </select>
                                    <div className="flex justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-700">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 rounded-xl text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700 transition-colors">Batal</button>
                                        <button type="submit" className="px-6 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-medium shadow-lg shadow-emerald-500/30 transition-all">Simpan Data</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ReportView = ({ data }) => {
            const handleExportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(18);
                doc.setTextColor(5, 150, 105); // Emerald-600
                doc.text("InovaHub", 14, 22);
                
                doc.setFontSize(12);
                doc.setTextColor(51, 65, 85); // Slate-700
                doc.text("Laporan Rekapitulasi Luaran Mahasiswa", 14, 30);
                
                doc.setFontSize(10);
                doc.text("Dicetak pada: " + new Date().toLocaleDateString('id-ID'), 14, 36);
                
                const tableColumn = ["No", "Judul Luaran", "Mahasiswa", "NIM", "Prodi", "Kategori", "Status"];
                const tableRows = [];
                
                data.forEach((item, index) => {
                    const rowData = [
                        index + 1,
                        item.judul || '-',
                        item.nama || '-',
                        item.nim || '-',
                        item.prodi || '-',
                        item.kategori || '-',
                        item.status || '-'
                    ];
                    tableRows.push(rowData);
                });
                
                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 42,
                    theme: 'grid',
                    styles: { fontSize: 8, cellPadding: 3 },
                    headStyles: { fillColor: [5, 150, 105], textColor: 255 },
                    alternateRowStyles: { fillColor: [248, 250, 252] }
                });
                
                doc.save(`Laporan_Inovasi_${new Date().getTime()}.pdf`);
            };

            const handleExportExcel = () => {
                const excelData = data.map((item, index) => ({
                    "No": index + 1,
                    "Judul Luaran": item.judul,
                    "Nama Mahasiswa": item.nama,
                    "NIM": item.nim,
                    "Program Studi": item.prodi,
                    "Kategori": item.kategori,
                    "Status": item.status,
                    "Tautan Bukti": item.link
                }));
                
                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data Inovasi");
                
                const wscols = [ {wch:5}, {wch:40}, {wch:25}, {wch:15}, {wch:25}, {wch:20}, {wch:15}, {wch:35} ];
                ws['!cols'] = wscols;
                
                XLSX.writeFile(wb, `Laporan_Inovasi_${new Date().getTime()}.xlsx`);
            };
            
            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 gap-4">
                        <h2 className="text-xl font-bold">Laporan Inovasi</h2>
                        <div className="flex gap-3 w-full md:w-auto">
                            <button onClick={handleExportExcel} className="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/30 transition-all font-medium">
                                <Icon name="table_chart" /> Export Excel
                            </button>
                            <button onClick={handleExportPDF} className="flex-1 md:flex-none bg-rose-600 hover:bg-rose-700 text-white px-5 py-2.5 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-rose-500/30 transition-all font-medium">
                                <Icon name="picture_as_pdf" /> Export PDF
                            </button>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-x-auto">
                        <div className="text-center mb-8 pb-6 border-b border-slate-200 dark:border-slate-700">
                            <h1 className="text-2xl font-bold uppercase">Laporan Rekapitulasi Luaran Mahasiswa</h1>
                            <p className="opacity-70 mt-2">Pratinjau Data - {new Date().toLocaleDateString('id-ID')}</p>
                        </div>
                        <table className="w-full text-left text-sm border-collapse min-w-[800px]">
                            <thead className="bg-slate-100 dark:bg-slate-700">
                                <tr>
                                    <th className="border border-slate-300 dark:border-slate-600 p-3">No</th>
                                    <th className="border border-slate-300 dark:border-slate-600 p-3">Judul Luaran</th>
                                    <th className="border border-slate-300 dark:border-slate-600 p-3">Mahasiswa</th>
                                    <th className="border border-slate-300 dark:border-slate-600 p-3">Prodi</th>
                                    <th className="border border-slate-300 dark:border-slate-600 p-3">Kategori</th>
                                    <th className="border border-slate-300 dark:border-slate-600 p-3">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {data.map((item, idx) => (
                                    <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                                        <td className="border border-slate-300 dark:border-slate-600 p-3 text-center">{idx + 1}</td>
                                        <td className="border border-slate-300 dark:border-slate-600 p-3">{item.judul}</td>
                                        <td className="border border-slate-300 dark:border-slate-600 p-3">{item.nama}<br/><span className="text-xs opacity-70">{item.nim}</span></td>
                                        <td className="border border-slate-300 dark:border-slate-600 p-3">{item.prodi}</td>
                                        <td className="border border-slate-300 dark:border-slate-600 p-3">{item.kategori}</td>
                                        <td className="border border-slate-300 dark:border-slate-600 p-3">
                                            <span className={`px-2 py-1 rounded-full text-xs font-medium ${item.status === 'Disetujui' ? 'bg-emerald-100 text-emerald-600' : item.status === 'Review' ? 'bg-orange-100 text-orange-600' : 'bg-slate-100 text-slate-600'}`}>
                                                {item.status}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                                {data.length === 0 && <tr><td colSpan="6" className="text-center p-8 opacity-50">Data Laporan Kosong</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const SettingsView = ({ user, onToast }) => {
            const [oldPassword, setOldPassword] = React.useState('');
            const [newPassword, setNewPassword] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);

            const handleUpdatePassword = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    const res = await callApi('changePassword', { user: user.username || 'admin', oldPass: oldPassword, newPass: newPassword });
                    onToast(res.msg);
                    if(res.success) {
                        setOldPassword('');
                        setNewPassword('');
                    }
                } catch(err) {
                    onToast("Gagal memperbarui password");
                }
                setIsLoading(false);
            };

            return (
                <div className="space-y-6 animate-fade-in max-w-3xl">
                    <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                        <div className="flex items-center gap-4 mb-8 pb-6 border-b border-slate-100 dark:border-slate-700">
                            <div className="w-16 h-16 rounded-2xl bg-emerald-100 text-emerald-600 flex items-center justify-center text-3xl font-bold">
                                {user && user.name ? user.name.charAt(0) : 'A'}
                            </div>
                            <div>
                                <h2 className="text-xl font-bold">{user && user.name ? user.name : 'Administrator'}</h2>
                                <p className="text-slate-500">{user && user.role ? user.role : 'Admin Role'}</p>
                            </div>
                        </div>

                        <h3 className="text-lg font-bold mb-4">Ubah Password Keamanan</h3>
                        <form onSubmit={handleUpdatePassword} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium mb-2 text-slate-600 dark:text-slate-400">Password Lama</label>
                                <input type="password" required value={oldPassword} onChange={e=>setOldPassword(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-2 text-slate-600 dark:text-slate-400">Password Baru</label>
                                <input type="password" required value={newPassword} onChange={e=>setNewPassword(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 outline-none focus:border-emerald-500" />
                            </div>
                            <button type="submit" disabled={isLoading} className="mt-4 px-6 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-medium shadow-lg shadow-emerald-500/30 transition-all disabled:opacity-50">
                                {isLoading ? 'Menyimpan...' : 'Perbarui Password'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [isDark, setIsDark] = React.useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
            
            // State Data Utama
            const [data, setData] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            
            // State Notifikasi
            const [toast, setToast] = React.useState('');

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            };

            const toggleTheme = () => {
                setIsDark(!isDark);
                document.documentElement.classList.toggle('dark');
            };

            const handleLogin = async (username, password) => {
                setLoading(true);
                try {
                    const res = await callApi('login', { user: username, pass: password });
                    if (res.success) {
                        setUser({ ...res, username });
                        fetchData();
                    } else {
                        showToast(res.msg || 'Gagal login');
                    }
                } catch(e) { showToast(e.message); }
                setLoading(false);
            };

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await callApi('getData');
                    setData(res || []);
                } catch(e) { showToast(e.message); }
                setLoading(false);
            };

            const saveData = async (formData) => {
                setLoading(true);
                try {
                    const res = await callApi('saveData', { data: formData });
                    showToast(res.msg);
                    if(res.success) fetchData();
                } catch(e) { showToast(e.message); }
                setLoading(false);
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-slate-100 dark:bg-slate-900">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-emerald-400/20 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-400/20 rounded-full blur-3xl"></div>
                        
                        <div className="w-full max-w-md glass-panel p-8 rounded-[2rem] shadow-2xl relative z-10 border border-white/40 dark:border-slate-700/40 animate-fade-in">
                            <div className="text-center mb-10">
                                <div className="w-16 h-16 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/30">
                                    <Icon name="tips_and_updates" className="text-white text-3xl" />
                                </div>
                                <h1 className="text-2xl font-bold tracking-tight">Portal Inovasi</h1>
                                <p className="text-slate-500 dark:text-slate-400 text-sm mt-1">Kolektor Luaran Mahasiswa</p>
                            </div>

                            <form onSubmit={(e) => {
                                e.preventDefault();
                                handleLogin(e.target.username.value, e.target.password.value);
                            }} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium mb-2 opacity-80">Username</label>
                                    <div className="relative">
                                        <Icon name="person" className="absolute left-3 top-3.5 text-slate-400 text-xl" />
                                        <input name="username" required className="w-full pl-10 pr-4 py-3 bg-white/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-emerald-500 outline-none transition-all" placeholder="admin" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-2 opacity-80">Password</label>
                                    <div className="relative">
                                        <Icon name="lock" className="absolute left-3 top-3.5 text-slate-400 text-xl" />
                                        <input name="password" type="password" required className="w-full pl-10 pr-4 py-3 bg-white/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-emerald-500 outline-none transition-all" placeholder="••••••••" />
                                    </div>
                                </div>
                                <button disabled={loading} type="submit" className="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold text-lg shadow-lg shadow-emerald-500/30 transition-all hover:-translate-y-0.5 disabled:opacity-50 mt-4">
                                    {loading ? 'Memproses...' : 'Masuk Dashboard'}
                                </button>
                            </form>
                        </div>
                        
                        {toast && <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 animate-fade-in flex items-center gap-2"><Icon name="info" /> {toast}</div>}
                    </div>
                );
            }

            const menuItems = [
                { id: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
                { id: 'data', icon: 'database', label: 'Data Inovasi' },
                { id: 'laporan', icon: 'bar_chart', label: 'Laporan Inovasi' },
                { id: 'settings', icon: 'settings', label: 'Pengaturan' }
            ];

            const getGreeting = () => {
                const hour = new Date().getHours();
                if(hour < 11) return "Selamat Pagi ☀️";
                if(hour < 15) return "Selamat Siang 🌤️";
                if(hour < 18) return "Selamat Sore 🌅";
                return "Selamat Malam 🌙";
            };

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50 dark:bg-slate-900">
                    {/* Sidebar Desktop */}
                    <aside className="hidden md:flex flex-col w-72 bg-white dark:bg-slate-800 border-r border-slate-100 dark:border-slate-700 z-20">
                        <div className="p-6 flex items-center gap-3">
                            <div className="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/30">
                                <Icon name="tips_and_updates" className="text-white" />
                            </div>
                            <span className="text-xl font-bold tracking-tight">InovaHub</span>
                        </div>
                        <div className="px-4 py-2">
                            <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-2">Menu Navigation</p>
                            <nav className="space-y-1">
                                {menuItems.map(item => (
                                    <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-medium transition-all ${activeTab === item.id ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                                        <Icon name={item.icon} /> {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="mt-auto p-4 border-t border-slate-100 dark:border-slate-700">
                            <div className="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-700/30 rounded-2xl">
                                <div className="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold">
                                    {user && user.name ? user.name.charAt(0) : 'A'}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-sm font-bold truncate">{user && user.name ? user.name : 'Admin'}</p>
                                    <p className="text-xs text-slate-500 truncate">{user && user.role ? user.role : 'Administrator'}</p>
                                </div>
                                <button onClick={() => window.location.reload()} className="p-2 text-slate-400 hover:text-rose-500 transition-colors">
                                    <Icon name="logout" />
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        {/* Header */}
                        <header className="h-20 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-700 flex items-center justify-between px-6 z-10 sticky top-0">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(true)} className="md:hidden p-2 bg-slate-100 dark:bg-slate-700 rounded-xl">
                                    <Icon name="menu" />
                                </button>
                                <h2 className="text-xl font-bold">{getGreeting()}</h2>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={toggleTheme} className="p-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 rounded-full transition-colors">
                                    <Icon name={isDark ? 'light_mode' : 'dark_mode'} />
                                </button>
                                <div className="hidden md:block text-sm font-medium text-slate-500 bg-slate-100 dark:bg-slate-700 px-4 py-2 rounded-full">
                                    {new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                                </div>
                            </div>
                        </header>

                        {/* Content Scroll Area */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 relative">
                            {loading && (
                                <div className="absolute inset-0 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm z-40 flex items-center justify-center">
                                    <div className="w-12 h-12 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin"></div>
                                </div>
                            )}
                            
                            <div className="max-w-7xl mx-auto">
                                {activeTab === 'dashboard' && <DashboardView data={data} />}
                                {activeTab === 'data' && <DataView data={data} onSave={saveData} onToast={showToast} />}
                                {activeTab === 'laporan' && <ReportView data={data} />}
                                {activeTab === 'settings' && <SettingsView user={user} onToast={showToast} />}
                            </div>
                            
                            <div className="mt-12 text-center text-sm text-slate-400 pb-20 md:pb-4">
                                Generated by Bot AppScript | By @opickdigital
                            </div>
                        </div>
                    </main>

                    {/* Mobile Bottom Navigation */}
                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-slate-100 dark:border-slate-700 flex justify-around p-3 pb-safe z-30">
                        {menuItems.map(item => (
                            <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex flex-col items-center gap-1 p-2 ${activeTab === item.id ? 'text-emerald-600' : 'text-slate-400'}`}>
                                <Icon name={item.icon} className={activeTab === item.id ? 'fill-current' : ''} />
                                <span className="text-[10px] font-medium">{item.label.split(' ')[0]}</span>
                            </button>
                        ))}
                    </div>

                    {/* Mobile Sidebar Overlay */}
                    {isSidebarOpen && (
                        <div className="md:hidden fixed inset-0 bg-slate-900/50 z-50 flex" onClick={() => setIsSidebarOpen(false)}>
                            <div className="w-64 bg-white dark:bg-slate-800 h-full p-6 animate-fade-in" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-8">
                                    <span className="text-xl font-bold">Menu</span>
                                    <button onClick={() => setIsSidebarOpen(false)}><Icon name="close" /></button>
                                </div>
                                <nav className="space-y-2">
                                    {menuItems.map(item => (
                                        <button key={item.id} onClick={() => { setActiveTab(item.id); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-medium ${activeTab === item.id ? 'bg-emerald-50 text-emerald-600' : 'text-slate-600'}`}>
                                            <Icon name={item.icon} /> {item.label}
                                        </button>
                                    ))}
                                    <button onClick={() => window.location.reload()} className="w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-medium text-rose-500 mt-8 border border-rose-100">
                                        <Icon name="logout" /> Keluar
                                    </button>
                                </nav>
                            </div>
                        </div>
                    )}

                    {/* Toast */}
                    {toast && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 animate-fade-in flex items-center gap-2">
                            <Icon name="info" /> {toast}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
