<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kolektor Luaran Inovasi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 700: '#047857' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        body { transition: background-color 0.3s, color 0.3s; }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
            line-height: 1;
        }

        @media print {
            body { background: white !important; color: black !important; }
            aside, header, .no-print { display: none !important; }
            main { overflow: visible !important; height: auto !important; margin: 0 !important; padding: 0 !important; }
            .glass-panel { box-shadow: none !important; border: 1px solid #ccc !important; background: transparent !important; }
            ::-webkit-scrollbar { display: none; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased selection:bg-emerald-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ====================================================================
        // PENTING BOS! MASUKKAN URL WEB APP ANDA DI DALAM TANDA KUTIP DI BAWAH INI
        // CONTOH: const GAS_URL = 'https://script.google.com/macros/s/AKfycb.../exec';
        // ====================================================================
        const GAS_URL = 'https://script.google.com/a/macros/gdrive1.biz.id/s/AKfycbx8TpGpfiLNSrYo2Ye6TQKuTre0oVq88Qmco-L67-_5eevkXfQN0uCQ9qSmoiLG4OHq/exec';
        
        const isMockMode = GAS_URL === 'MASUKKAN_URL_WEB_APP_APPSCRIPT_DISINI' || GAS_URL === '';
        
        const mockData = [
            { id: 'INV-A1B2', timestamp: '2026-07-10T10:00:00Z', nim: '19001111', nama: 'Budi Santoso', prodi: 'Teknik Informatika', judul: 'Sistem Deteksi Penyakit Tanaman', kategori: 'Paten', deskripsi: 'Aplikasi AI', link: 'http://link', status: 'Disetujui' }
        ];

        const fetchGasApi = async (action, payload = {}) => {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Aman dari blokir CORS
                    body: JSON.stringify({ action, ...payload })
                });
                return await response.json();
            } catch (err) {
                console.error("Fetch Error:", err);
                return { success: false, msg: 'Gagal menghubungi server Google Apps Script.' };
            }
        };

        const API = {
            login: async (user, pass) => {
                if(isMockMode) return new Promise(resolve => setTimeout(() => resolve({ success: user==='admin'&&pass==='admin123', name: 'Admin', msg: 'Username/Password salah (Mock)' }), 1000));
                return await fetchGasApi('login', { user, pass });
            },
            getData: async () => {
                if(isMockMode) return new Promise(resolve => setTimeout(() => resolve(mockData), 800));
                const res = await fetchGasApi('getData');
                return Array.isArray(res) ? res : [];
            },
            saveData: async (data) => {
                if(isMockMode) return new Promise(resolve => setTimeout(() => resolve({ success: true, msg: 'Data disimpan (Mock)' }), 1000));
                return await fetchGasApi('saveData', { data });
            },
            changePassword: async (user, oldPass, newPass) => {
                if(isMockMode) return new Promise(resolve => setTimeout(() => resolve({ success: true, msg: 'Password berhasil diubah (Mock)' }), 1000));
                return await fetchGasApi('changePassword', { user, oldPass, newPass });
            }
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, []);
            
            const bgColor = type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            const icon = type === 'success' ? 'check_circle' : 'error';
            
            return (
                <div className={`fixed bottom-4 right-4 ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50 animate-bounce`}>
                    <span className="material-symbols-rounded text-[24px]">{icon}</span>
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        const Login = ({ onLogin }) => {
            const [user, setUser] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                const res = await API.login(user, pass);
                setLoading(false);
                if (res.success) onLogin(res.name);
                else setError(res.msg);
            };

            return (
                <div className="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-900">
                    <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-emerald-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-50 animate-pulse"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-50 animate-pulse delay-1000"></div>
                    
                    <div className="w-full max-w-md p-8 relative z-10">
                        <div className="glass-panel p-10 rounded-3xl shadow-2xl border border-white/20">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-gradient-to-tr from-emerald-500 to-emerald-300 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg transform rotate-3">
                                    <span className="material-symbols-rounded text-[32px] text-white -rotate-3">lightbulb</span>
                                </div>
                                <h1 className="text-2xl font-bold text-white">Portal Inovasi</h1>
                                <p className="text-emerald-200 text-sm mt-1">Kolektor Luaran Mahasiswa</p>
                            </div>

                            {error && <div className="bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-3 rounded-xl mb-6 text-sm">{error}</div>}

                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-1">Username</label>
                                    <div className="relative">
                                        <span className="material-symbols-rounded absolute left-3 top-[10px] text-[20px] text-slate-400">person</span>
                                        <input type="text" value={user} onChange={(e) => setUser(e.target.value)} required 
                                            className="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-emerald-500 outline-none transition" placeholder="Masukkan username" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-1">Password</label>
                                    <div className="relative">
                                        <span className="material-symbols-rounded absolute left-3 top-[10px] text-[20px] text-slate-400">lock</span>
                                        <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} required 
                                            className="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-emerald-500 outline-none transition" placeholder="••••••••" />
                                    </div>
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-emerald-500/30 transition flex justify-center items-center gap-2">
                                    {loading ? <span className="material-symbols-rounded animate-spin text-[20px]">progress_activity</span> : 'Masuk Dashboard'}
                                </button>
                            </form>
                            
                            {isMockMode && (
                                <div className="mt-6 text-center text-xs text-slate-400 bg-slate-800/50 py-2 rounded-lg">
                                    <span className="text-emerald-400 font-semibold">Mock Mode Aktif (Coba Tanpa Deploy GAS)</span><br/>
                                    User: admin | Pass: admin123
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ data }) => {
            const chartRef = useRef(null);
            const doughnutRef = useRef(null);

            const stats = useMemo(() => {
                const safeData = Array.isArray(data) ? data : [];
                return { 
                    total: safeData.length, 
                    disetujui: safeData.filter(d => d.status === 'Disetujui').length, 
                    paten: safeData.filter(d => d.kategori === 'Paten').length, 
                    startup: safeData.filter(d => d.kategori === 'Startup').length 
                };
            }, [data]);

            useEffect(() => {
                let myChart = null, myDoughnut = null;
                if (chartRef.current && doughnutRef.current && Array.isArray(data) && data.length > 0) {
                    try {
                        const categories = ['Paten', 'Jurnal Internasional', 'Jurnal Nasional', 'Hak Cipta', 'Produk Tepat Guna', 'Startup'];
                        const counts = categories.map(cat => data.filter(d => d.kategori === cat).length);
                        myChart = new Chart(chartRef.current, {
                            type: 'bar',
                            data: { labels: categories, datasets: [{ label: 'Jumlah', data: counts, backgroundColor: 'rgba(16, 185, 129, 0.8)', borderRadius: 8 }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                        });

                        const statuses = ['Draft', 'Review', 'Disetujui', 'Ditolak'];
                        myDoughnut = new Chart(doughnutRef.current, {
                            type: 'doughnut',
                            data: { labels: statuses, datasets: [{ data: statuses.map(s => data.filter(d => d.status === s).length), backgroundColor: ['#94a3b8', '#fbbf24', '#10b981', '#ef4444'], borderWidth: 0 }] },
                            options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
                        });
                    } catch (e) { console.error("Chart Error:", e); }
                }
                return () => { if (myChart) myChart.destroy(); if (myDoughnut) myDoughnut.destroy(); };
            }, [data]);

            return (
                <div className="space-y-6">
                    <div className="bg-gradient-to-r from-emerald-600 to-emerald-400 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                        <div className="absolute right-0 top-0 opacity-20 transform translate-x-4 -translate-y-4">
                            <span className="material-symbols-rounded text-[150px]">workspace_premium</span>
                        </div>
                        <div className="relative z-10">
                            <h2 className="text-2xl font-bold mb-1">Ringkasan Luaran Mahasiswa</h2>
                            <p className="text-emerald-50">Pantau perkembangan inovasi mahasiswa secara realtime.</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {[
                            { title: 'Total Inovasi', value: stats.total, icon: 'layers', color: 'text-blue-500', bg: 'bg-blue-100 dark:bg-blue-900/30' },
                            { title: 'Disetujui', value: stats.disetujui, icon: 'check_circle', color: 'text-emerald-500', bg: 'bg-emerald-100 dark:bg-emerald-900/30' },
                            { title: 'Paten', value: stats.paten, icon: 'shield', color: 'text-purple-500', bg: 'bg-purple-100 dark:bg-purple-900/30' },
                            { title: 'Startup Aktif', value: stats.startup, icon: 'rocket_launch', color: 'text-orange-500', bg: 'bg-orange-100 dark:bg-orange-900/30' },
                        ].map((s, i) => (
                            <div key={i} className="glass-panel p-6 rounded-2xl shadow-sm hover:shadow-md transition">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-slate-500 font-medium">{s.title}</p><h3 className="text-3xl font-bold mt-2">{s.value}</h3></div>
                                    <div className={`p-3 rounded-xl ${s.bg}`}><span className={`material-symbols-rounded text-[24px] ${s.color}`}>{s.icon}</span></div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-96">
                        <div className="lg:col-span-2 glass-panel p-6 rounded-2xl shadow-sm flex flex-col h-full">
                            <h3 className="text-lg font-semibold mb-4">Distribusi Kategori</h3>
                            <div className="flex-grow relative"><canvas ref={chartRef}></canvas></div>
                        </div>
                        <div className="glass-panel p-6 rounded-2xl shadow-sm flex flex-col h-full">
                            <h3 className="text-lg font-semibold mb-4">Status Penilaian</h3>
                            <div className="flex-grow relative"><canvas ref={doughnutRef}></canvas></div>
                        </div>
                    </div>
                </div>
            );
        };

        const DataView = ({ data, onRefresh, showToast }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('Semua');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [loading, setLoading] = useState(false);

            const filteredData = (Array.isArray(data) ? data : []).filter(item => {
                const searchLower = searchTerm.toLowerCase();
                const matchSearch = String(item.judul||'').toLowerCase().includes(searchLower) || String(item.nama||'').toLowerCase().includes(searchLower);
                return matchSearch && (filterStatus === 'Semua' || item.status === filterStatus);
            });

            const handleSave = async (e) => {
                e.preventDefault();
                setLoading(true);
                const submitData = { ...formData, id: formData.id || 'INV-' + Math.random().toString(36).substr(2, 6).toUpperCase() };
                const res = await API.saveData(submitData);
                setLoading(false);
                if (res.success) { showToast('Data disimpan!', 'success'); setIsModalOpen(false); onRefresh(); }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold">Manajemen Data</h2>
                        <button onClick={() => { setFormData({kategori: 'Paten', status: 'Draft'}); setIsModalOpen(true); }} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl shadow-lg transition flex items-center gap-2">
                            <span className="material-symbols-rounded">add</span> Tambah
                        </button>
                    </div>

                    <div className="glass-panel p-4 rounded-2xl flex gap-4">
                        <div className="relative flex-1">
                            <span className="material-symbols-rounded absolute left-3 top-[10px] text-slate-400">search</span>
                            <input type="text" placeholder="Cari..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-slate-50 dark:bg-slate-800 border rounded-xl py-2 pl-10 outline-none" />
                        </div>
                        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="bg-slate-50 dark:bg-slate-800 border rounded-xl px-4 py-2 outline-none">
                            <option value="Semua">Semua Status</option><option value="Draft">Draft</option><option value="Review">Review</option><option value="Disetujui">Disetujui</option>
                        </select>
                    </div>

                    <div className="glass-panel rounded-2xl overflow-hidden overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead><tr className="bg-slate-100 dark:bg-slate-800/50 text-sm"><th className="p-4">Judul & Mahasiswa</th><th className="p-4">Kategori</th><th className="p-4">Status</th><th className="p-4 text-right">Aksi</th></tr></thead>
                            <tbody>
                                {filteredData.map((item, i) => (
                                    <tr key={i} className="border-t dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                                        <td className="p-4"><div>{item.judul}</div><div className="text-sm text-slate-500">{item.nama} ({item.nim})</div></td>
                                        <td className="p-4"><span className="px-2 py-1 bg-indigo-100 text-indigo-800 rounded-full text-xs">{item.kategori}</span></td>
                                        <td className="p-4"><span className="px-2 py-1 bg-slate-200 text-slate-800 rounded-full text-xs">{item.status}</span></td>
                                        <td className="p-4 text-right">
                                            <button onClick={() => { setFormData(item); setIsModalOpen(true); }} className="p-2 text-slate-400 hover:text-emerald-500"><span className="material-symbols-rounded">edit</span></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                            <div className="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-3xl p-6">
                                <h3 className="text-xl font-bold mb-4">{formData.id ? 'Edit' : 'Tambah'} Luaran</h3>
                                <form onSubmit={handleSave} className="grid grid-cols-2 gap-4">
                                    <input required placeholder="Judul" value={formData.judul||''} onChange={e=>setFormData({...formData, judul: e.target.value})} className="col-span-2 p-2 border rounded" />
                                    <input required placeholder="NIM" value={formData.nim||''} onChange={e=>setFormData({...formData, nim: e.target.value})} className="p-2 border rounded" />
                                    <input required placeholder="Nama" value={formData.nama||''} onChange={e=>setFormData({...formData, nama: e.target.value})} className="p-2 border rounded" />
                                    <input required placeholder="Prodi" value={formData.prodi||''} onChange={e=>setFormData({...formData, prodi: e.target.value})} className="p-2 border rounded" />
                                    <select value={formData.kategori} onChange={e=>setFormData({...formData, kategori: e.target.value})} className="p-2 border rounded"><option value="Paten">Paten</option><option value="Jurnal Internasional">Jurnal Internasional</option><option value="Startup">Startup</option></select>
                                    <input placeholder="Link Bukti" value={formData.link||''} onChange={e=>setFormData({...formData, link: e.target.value})} className="col-span-2 p-2 border rounded" />
                                    <div className="col-span-2 flex justify-end gap-2 mt-4">
                                        <button type="button" onClick={()=>setIsModalOpen(false)} className="px-4 py-2 border rounded">Batal</button>
                                        <button type="submit" disabled={loading} className="px-4 py-2 bg-emerald-600 text-white rounded">{loading ? 'Menyimpan...' : 'Simpan'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ReportView = ({ data }) => (
            <div className="space-y-6">
                <div className="flex justify-between items-center no-print">
                    <h2 className="text-2xl font-bold">Laporan Inovasi</h2>
                    <button onClick={() => window.print()} className="bg-blue-600 text-white px-5 py-2 rounded-xl flex items-center gap-2"><span className="material-symbols-rounded">print</span> Cetak</button>
                </div>
                <div className="glass-panel p-6 rounded-2xl bg-white dark:bg-slate-900 w-full overflow-hidden">
                    <div className="text-center mb-6 hidden print:block text-black">
                        <h1 className="text-2xl font-bold">Laporan Luaran Inovasi</h1>
                        <p>Dicetak pada: {new Date().toLocaleDateString('id-ID')}</p>
                    </div>
                    <table className="w-full text-left border-collapse border">
                        <thead><tr className="bg-slate-100 text-slate-700 print:text-black"><th className="p-2 border">NIM</th><th className="p-2 border">Nama</th><th className="p-2 border">Judul</th><th className="p-2 border">Kategori</th></tr></thead>
                        <tbody>{(Array.isArray(data)?data:[]).map((item, i) => <tr key={i}><td className="p-2 border print:text-black">{item.nim}</td><td className="p-2 border print:text-black">{item.nama}</td><td className="p-2 border print:text-black">{item.judul}</td><td className="p-2 border print:text-black">{item.kategori}</td></tr>)}</tbody>
                    </table>
                </div>
            </div>
        );

        const SettingsView = ({ user, toggleTheme, isDark, showToast }) => {
            const [oldPass, setOldPass] = useState('');
            const [newPass, setNewPass] = useState('');
            const handlePass = async (e) => {
                e.preventDefault();
                const res = await API.changePassword(user, oldPass, newPass);
                showToast(res.msg, res.success ? 'success' : 'error');
                if(res.success) { setOldPass(''); setNewPass(''); }
            };
            return (
                <div className="space-y-6 max-w-4xl mx-auto">
                    <h2 className="text-2xl font-bold">Pengaturan</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="glass-panel p-6 rounded-2xl">
                            <h3 className="text-lg font-semibold mb-4">Ubah Password</h3>
                            <form onSubmit={handlePass} className="space-y-4">
                                <input type="password" placeholder="Password Lama" value={oldPass} onChange={e=>setOldPass(e.target.value)} required className="w-full p-3 rounded-xl border outline-none text-black" />
                                <input type="password" placeholder="Password Baru" value={newPass} onChange={e=>setNewPass(e.target.value)} required className="w-full p-3 rounded-xl border outline-none text-black" />
                                <button type="submit" className="w-full bg-emerald-600 text-white py-3 rounded-xl">Simpan Password</button>
                            </form>
                        </div>
                        <div className="glass-panel p-6 rounded-2xl">
                            <h3 className="text-lg font-semibold mb-4">Tampilan</h3>
                            <div className="flex justify-between items-center p-4 border rounded-xl">
                                <span>Dark Mode</span>
                                <button onClick={toggleTheme} className={`h-7 w-12 rounded-full transition-colors ${isDark ? 'bg-emerald-500' : 'bg-slate-300'}`}>
                                    <span className={`block h-5 w-5 rounded-full bg-white transition-transform ${isDark ? 'translate-x-6' : 'translate-x-1'}`} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [active, setActive] = useState('dashboard');
            const [isDark, setIsDark] = useState(false);
            const [toast, setToast] = useState(null);
            const [data, setData] = useState([]);

            useEffect(() => {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setIsDark(true); document.documentElement.classList.add('dark');
                }
            }, []);

            const toggleTheme = () => { setIsDark(!isDark); document.documentElement.classList.toggle('dark'); };
            
            const loadData = async () => {
                try {
                    const result = await API.getData();
                    setData(Array.isArray(result) ? result : []);
                } catch(e) { setData([]); }
            };

            useEffect(() => { if (user) loadData(); }, [user]);

            if (!user) return <Login onLogin={setUser} />;

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-64 glass-panel border-r flex flex-col hidden lg:flex">
                        <div className="p-6 font-bold text-xl flex items-center gap-2"><span className="material-symbols-rounded text-emerald-500">lightbulb</span> InovaHub</div>
                        <nav className="flex-1 px-4 space-y-2">
                            {[{id:'dashboard', icon:'dashboard', label:'Dashboard'}, {id:'data', icon:'database', label:'Data'}, {id:'report', icon:'bar_chart', label:'Laporan'}, {id:'settings', icon:'settings', label:'Pengaturan'}].map(m => (
                                <button key={m.id} onClick={() => setActive(m.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl ${active === m.id ? 'bg-emerald-500/10 text-emerald-600' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                                    <span className="material-symbols-rounded">{m.icon}</span> {m.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t flex justify-between items-center">
                            <span className="font-semibold">{user}</span>
                            <button onClick={() => setUser(null)} className="text-red-500"><span className="material-symbols-rounded">logout</span></button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="glass-panel border-b px-6 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-bold">Menu Navigation</h1>
                            <div className="flex gap-4 items-center">
                                {isMockMode && <span className="bg-amber-100 text-amber-800 text-xs px-2 py-1 rounded">Mock Mode</span>}
                                <button onClick={toggleTheme}><span className="material-symbols-rounded">{isDark ? 'light_mode' : 'dark_mode'}</span></button>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-6">
                            {active === 'dashboard' && <DashboardView data={data} />}
                            {active === 'data' && <DataView data={data} onRefresh={loadData} showToast={(m, t) => setToast({msg:m, type:t})} />}
                            {active === 'report' && <ReportView data={data} />}
                            {active === 'settings' && <SettingsView user={user} toggleTheme={toggleTheme} isDark={isDark} showToast={(m, t) => setToast({msg:m, type:t})} />}
                        </div>
                        {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
